name: tv_a2ui
description: AI-powered TV App with GPT 5.4 — a2ui (AI to UI) concept

publish_to: 'none'
version: 0.9.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.1
  flutter_animate: ^4.3.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  speech_to_text: ^6.6.0
  flutter_tts: ^4.0.2
  uuid: ^4.2.1
  shared_preferences: ^2.2.2
  lottie: ^3.0.0
  url_launcher: ^6.2.0
  flutter_widget_from_html: ^0.15.2
  genui:
    path: vendor/genui
  web_socket_channel: ^3.0.0

dependency_overrides:
  genai_primitives:
    path: vendor/genai_primitives
  json_schema_builder:
    path: vendor/json_schema_builder

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
