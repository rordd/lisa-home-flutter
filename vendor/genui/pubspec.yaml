name: genui
description: Generates and displays generative user interfaces (GenUI) in Flutter using AI.
version: 0.7.0
homepage: https://github.com/flutter/genui/tree/main/packages/genui
license: BSD-3-Clause
issue_tracker: https://github.com/flutter/genui/issues

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0 <4.0.0"


dependencies:
  collection: ^1.19.0
  flutter:
    sdk: flutter
  flutter_markdown_plus: ^1.0.5
  genai_primitives:
    path: ../genai_primitives
  json_schema_builder:
    path: ../json_schema_builder
  logging: ^1.3.0
  uuid: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  network_image_mock: ^2.1.1
